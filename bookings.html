<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SKILLS Gym · Bookings</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../../assets/css/admin.css"/>
  <script>
    tailwind.config = {
      theme: { extend: {
        fontFamily: { display: ['Bebas Neue','sans-serif'], body: ['DM Sans','sans-serif'] },
        colors: { brand: { dark:'#0b0f1a', surface:'#111827', card:'#1a2235', border:'#1e2d45', muted:'#4b6280', text:'#cdd9ea', blue1:'#007bff', blue2:'#00d2ff', orange1:'#ff8c00' } },
        backgroundImage: { 'grad-blue':'linear-gradient(135deg,#007bff 0%,#00d2ff 100%)', 'grad-orange':'linear-gradient(135deg,#ff8c00 0%,#e65100 100%)', 'grad-card':'linear-gradient(145deg,#1a2235 0%,#111827 100%)' }
      }}
    }
  </script>
</head>
<body class="bg-brand-dark font-body text-brand-text min-h-screen flex overflow-hidden">
  <!-- Sidebar (shared shell — identical to index) -->
  <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-64 flex flex-col bg-brand-surface border-r border-brand-border transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out">
    <div class="flex items-center gap-3 px-6 py-5 border-b border-brand-border shrink-0">
      <div class="w-9 h-9 rounded-lg bg-grad-blue flex items-center justify-center" style="box-shadow:0 0 20px rgba(0,123,255,.25)">
        <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 13.5l10.5-11.25L12 10.5h8.25L9.75 21.75 12 13.5H3.75z"/></svg>
      </div>
      <div><span class="font-display text-white text-xl tracking-wider leading-none">SKILLS</span><p class="text-[10px] text-brand-muted font-medium tracking-widest uppercase leading-none mt-0.5">Gym Rental</p></div>
    </div>
    <nav class="flex-1 overflow-y-auto py-6 px-3 space-y-1">
      <p class="text-[10px] font-semibold uppercase tracking-widest text-brand-muted px-3 mb-3">Main Menu</p>
      <a href="../index.html" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium">
        <svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>Dashboard</a>
      <a href="bookings.html" class="nav-link active flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium">
        <svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>Bookings
        <span class="ml-auto badge-orange text-xs font-semibold px-2 py-0.5 rounded-full">5</span></a>
      <a href="inventory.html" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium">
        <svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>Inventory</a>
      <a href="reports.html" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium">
        <svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>Reports</a>
      <div class="pt-4 mt-4 border-t border-brand-border">
        <p class="text-[10px] font-semibold uppercase tracking-widest text-brand-muted px-3 mb-3">System</p>
        <a href="settings.html" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium">
          <svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>Settings</a>
      </div>
    </nav>
    <div class="px-4 py-4 border-t border-brand-border shrink-0">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-full bg-grad-orange flex items-center justify-center text-white font-bold text-sm" style="box-shadow:0 0 20px rgba(255,140,0,.25)">JR</div>
        <div class="min-w-0"><p class="text-sm font-semibold text-white truncate">Jess Reyes</p><p class="text-xs text-brand-muted truncate">Super Admin</p></div>
      </div>
    </div>
  </aside>

  <div id="overlay" class="fixed inset-0 bg-black/60 z-30 hidden md:hidden" onclick="toggleSidebar()"></div>

  <div class="flex-1 flex flex-col min-h-screen md:ml-64 overflow-hidden">
    <header class="sticky top-0 z-20 bg-brand-surface/80 backdrop-blur-md border-b border-brand-border px-4 md:px-6 py-3.5 flex items-center gap-4 shrink-0">
      <button onclick="toggleSidebar()" class="md:hidden text-brand-muted hover:text-white p-1">
        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <div class="mr-auto"><h1 class="text-base font-semibold text-white">Bookings</h1><p class="text-xs text-brand-muted mt-0.5">Manage all rental requests</p></div>
      <button class="btn-orange text-white text-sm font-semibold px-4 py-2 rounded-xl flex items-center gap-2">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
        New Booking
      </button>
    </header>
    <main class="flex-1 overflow-y-auto p-4 md:p-6">
      <div class="rounded-2xl border border-brand-border bg-grad-card shadow-card p-10 text-center">
        <p class="font-display text-4xl text-white tracking-wider mb-2">BOOKINGS</p>
        <p class="text-brand-muted text-sm">Full bookings management table coming in Phase 2.</p>
        <a href="../index.html" class="mt-6 inline-block text-brand-blue2 text-sm hover:underline">← Back to Dashboard</a>
      </div>
    </main>
  </div>
  <script>function toggleSidebar(){const s=document.getElementById('sidebar');const o=document.getElementById('overlay');const open=!s.classList.contains('-translate-x-full');s.classList.toggle('-translate-x-full',open);o.classList.toggle('hidden',open);}</script>
</body>
</html>
